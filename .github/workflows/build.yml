name: Build

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
    paths:
      - 'src/**'
      - 'pom.xml'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx2048m'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.detect.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Project version: $VERSION"

      - name: Detect release type
        id: detect
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [[ "$VERSION" == *"-beta"* ]] || [[ "$VERSION" == *"-alpha"* ]] || [[ "$VERSION" == *"-SNAPSHOT"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Compile and package
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build and test with Maven
        run: mvn clean package -B -V --no-transfer-progress
        env:
          MAVEN_OPTS: ${{ env.MAVEN_OPTS }}

      - name: Verify build output
        run: |
          if ! ls target/ZDiscord-*.jar 1>/dev/null 2>&1; then
            echo "Build artifact not found"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: zdiscord-build-${{ needs.validate.outputs.version }}
          path: target/ZDiscord-*.jar
          retention-days: 30
          if-no-files-found: error

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: zdiscord-build-${{ needs.validate.outputs.version }}
          path: target

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          {
            echo "RELEASE_NOTES<<EOF"
            echo "## ZDiscord $VERSION"
            echo ""
            echo "### Download"
            echo "Download the JAR attached below and place it in your server's \`plugins/\` folder."
            echo ""
            echo "### Links"
            echo "- [Documentation](https://github.com/${{ github.repository }}/wiki)"
            echo "- [Issues](https://github.com/${{ github.repository }}/issues)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: ZDiscord v${{ needs.validate.outputs.version }}
          body: ${{ steps.notes.outputs.RELEASE_NOTES }}
          files: target/ZDiscord-*.jar
          prerelease: ${{ needs.validate.outputs.is_prerelease }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
