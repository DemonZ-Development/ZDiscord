name: ZDiscord
version: '${project.version}'
main: dev.demonz.zdiscord.ZDiscord
api-version: '1.20'
description: Discord integration for Minecraft servers
author: DemonZ Development
website: https://github.com/DemonZ-Development/ZDiscord

folia-supported: true

softdepend:
  - PlaceholderAPI
  - LuckPerms
  - Vault
  - Essentials

commands:
  zdiscord:
    description: ZDiscord admin command
    usage: /<command> [reload|status|link|embed|ticket|panel|lockdown|update|dump]
    permission: zdiscord.admin
    aliases: [zd]
  discord:
    description: Shows the Discord server invite link
    usage: /<command>
    permission: zdiscord.discord
  sc:
    description: Staff chat bridge
    usage: /<command> [message]
    permission: zdiscord.staffchat
    aliases: [staffchat]

permissions:
  zdiscord.admin:
    description: Access to ZDiscord admin commands
    default: op
  zdiscord.discord:
    description: Allows viewing the Discord invite link
    default: true
  zdiscord.link:
    description: Allows players to link their accounts
    default: true
  zdiscord.chat:
    description: Player chat is forwarded to Discord
    default: true
  zdiscord.ticket:
    description: Allows creating support tickets
    default: true
  zdiscord.embed:
    description: Allows sending custom Discord embeds
    default: op
  zdiscord.bypass.antiraid:
    description: Bypass anti-raid checks
    default: op
  zdiscord.bypass.link:
    description: Bypass link-to-join enforcement
    default: op
  zdiscord.bypass.console:
    description: Bypass console command role requirement (admin only)
    default: op
  zdiscord.staffchat:
    description: Access to staff chat
    default: op
