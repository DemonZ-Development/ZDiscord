# ZDiscord configuration
# Documentation: https://github.com/DemonZ-Development/ZDiscord/wiki

config-version: 3

# ── Storage ───────────────────────────────────────────────
storage:
  # "yaml" (default, file-based) or "mysql"
  type: "yaml"
  mysql:
    host: "localhost"
    port: 3306
    database: "zdiscord"
    username: "root"
    password: ""

# ── Bot ───────────────────────────────────────────────────
bot:
  # Discord bot token from https://discord.com/developers/applications
  token: "YOUR_BOT_TOKEN_HERE"
  activity:
    # PLAYING, WATCHING, LISTENING, COMPETING
    type: "WATCHING"
    text: "%online% players online"
  # Guild (server) ID for slash command registration
  guild-id: "YOUR_GUILD_ID_HERE"

# ── Channels ──────────────────────────────────────────────
channels:
  chat: "YOUR_CHAT_CHANNEL_ID"
  console: ""
  events: ""
  status: ""
  performance: ""
  achievements: ""
  ticket-category: ""
  # Channel for /confess submissions. Leave empty to disable the
  # /confess slash command entirely.
  confessions: ""

# ── Chat bridge ───────────────────────────────────────────
chat:
  use-webhooks: true
  # When the player has linked their Minecraft account, use the
  # Discord identity (avatar + display name) for the webhook instead
  # of their Minecraft skin/username. Unlinked players always use
  # the Minecraft identity.
  prefer-linked-avatar: true
  prefer-linked-name: true
  webhook-name: "%displayname%"
  # %uuid% is replaced with the player's UUID (no dashes)
  avatar-url: "https://crafatar.com/avatars/%uuid%?overlay=true"
  minecraft-format: "&9[Discord] &b%name% &8> &f%message%"
  show-attachments: true
  attachment-text: "&e[Attachment] &7(Click to open)"

# ── Event messages ────────────────────────────────────────
events:
  # Optional default footer icon for all event embeds. Falls back to
  # the guild icon if empty. Per-event override below (events.join.footer-icon,
  # events.quit.footer-icon, ...). Use a public https URL.
  footer-icon: ""
  join:
    enabled: true
    message: "**%player%** joined the server"
    color: "#2ECC71"
    # Optional override; leave empty to use events.footer-icon or the guild icon.
    footer-icon: ""
    # Send a private welcome message to the player the first time they join.
    first-join-message: "&aWelcome to the server, &e%player%&a! Type &e/help&a to get started."
    # Mark new players in the join embed with a :sparkles: indicator.
    show-first-join-indicator: true
  quit:
    enabled: true
    message: "**%player%** left the server"
    color: "#E74C3C"
    footer-icon: ""
  death:
    enabled: true
    message: "%death_message%"
    color: "#95A5A6"
  advancement:
    enabled: true
    color: "#F1C40F"
    # Show rarity badge when fewer than this fraction of players
    # have the advancement (0.0–1.0). 0.25 = bottom 25%.
    rarity-threshold: 0.25
    # Set to false to suppress rarity and first-of-day badges.
    show-rarity: true

# ── Status module ─────────────────────────────────────────
status:
  enabled: true
  update-interval: 30
  embed:
    title: "Server Status"
    color: "#5865F2"
    show-players: true
    show-tps: true
    show-memory: true
    server-ip: "play.yourserver.com"

# ── Leaderboard module ────────────────────────────────────
leaderboard:
  enabled: true
  tracked-stats:
    - KILLS
    - DEATHS
    - PLAYTIME
  top-count: 10

# ── Ticket module ─────────────────────────────────────────
tickets:
  enabled: true
  support-roles:
    - "YOUR_SUPPORT_ROLE_ID"
  max-per-user: 3
  auto-close-hours: 48
  # Optional Discord channel/category overrides for the ticket panel.
  # If panel-channel is set, the panel is re-posted there on /setup
  # even if you do not run the wizard.
  panel-channel: ""
  # Customise the panel embed posted to Discord.
  panel:
    title: "Support Center"
    description: |
      Need help? Pick a category below to open a private ticket.
      Our support team will respond as soon as possible.
    color: "#5865F2"
    thumbnail: ""
    image: ""
    footer: "ZDiscord Ticket System"
  # Categories shown in the panel dropdown. Add, remove, or edit
  # freely. Each entry needs a unique id, label, description, and emoji.
  categories:
    - id: "general"
      label: "General Support"
      description: "Questions, account help, or anything else."
      emoji: "💬"
      color: "#5865F2"
    - id: "bug"
      label: "Bug Report"
      description: "Something on the server is broken or behaving oddly."
      emoji: "🐛"
      color: "#E67E22"
    - id: "player"
      label: "Player Report"
      description: "Report a player breaking the rules."
      emoji: "🚨"
      color: "#E74C3C"
    - id: "purchase"
      label: "Purchase Help"
      description: "Need help with a store order or rank?"
      emoji: "🛒"
      color: "#2ECC71"

# ── Account linking ───────────────────────────────────────
linking:
  enabled: true
  required: false
  linked-role: ""
  # Commands run as console on the server when a player links.
  # Use %player% to substitute the player's name.
  rewards: []
  # Example: rewards: ["give %player% diamond 5"]

# ── Anti-raid module ──────────────────────────────────────
anti-raid:
  enabled: true
  max-joins: 10
  time-window: 30
  lockdown:
    kick-new-joins: true
    kick-message: "&cServer is in lockdown mode. Please try again later."
    notify-staff: true
    auto-lift: 300

# ── Performance monitor ───────────────────────────────────
performance:
  enabled: true
  update-interval: 60
  tps-warning: 18.0
  tps-critical: 15.0
  memory-warning: 80

# ── Reaction roles ────────────────────────────────────────
reaction-roles:
  enabled: true
  # Mappings are stored in reaction_roles.yml — see wiki for setup.
  mappings: []

# ── Miscellaneous ─────────────────────────────────────────
misc:
  invite-link: "https://discord.gg/yourserver"
  console-prefix: "!"
  # Discord role ID required to run console commands from Discord.
  # Leave empty to disable Discord console commands entirely.
  console-role: ""
  debug: false
  # Update-checker behaviour.
  update-checker: true
  # Set to true to suppress the in-game "Update available" banner
  # sent to admins on join. The check still runs every 5 hours
  # and still posts a silent embed to misc.update-channel.
  update-silent: false
  # Optional channel that receives a single quiet embed whenever
  # a new plugin release is detected. Leave empty to disable.
  update-channel: ""

# ── Command logger ────────────────────────────────────────
command-logger:
  enabled: true
  channel: ""
  # Commands that trigger a WATCHED log (yellow)
  watched-commands:
    - "ban"
    - "kick"
    - "mute"
    - "whitelist"
    - "gamemode"
  # Commands that trigger a CRITICAL log (red)
  critical-commands:
    - "op"
    - "deop"
    - "stop"
    - "restart"

# ── Staff chat ────────────────────────────────────────────
staff-chat:
  enabled: true
  channel: "YOUR_STAFF_CHAT_CHANNEL_ID"

# ── Voice status ──────────────────────────────────────────
voice-status:
  enabled: true
  # Discord voice channel ID to track
  channel: ""

# ── Player profile card (used by /profile) ───────────────
profile:
  embed:
    color: "#9B59B6"

# ── Follow (used by /profile Follow button) ──────────────
follow:
  enabled: true

# ── Confessions (used by /confess) ───────────────────────
confessions:
  color: "#9B59B6"
  # Cooldown in seconds between confessions per player.
  cooldown: 300
