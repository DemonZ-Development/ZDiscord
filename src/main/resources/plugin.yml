name: ZDiscord
version: '${project.version}'
main: dev.demonz.zdiscord.ZDiscord
api-version: '1.21'
description: Premium Discord ↔ Minecraft Integration | DemonZ Development
author: DemonZ Development
website: https://github.com/DemonZDevelopment/ZDiscord

folia-supported: true

softdepend:
  - PlaceholderAPI
  - LuckPerms
  - Vault
  - Essentials

commands:
  zdiscord:
    description: Main ZDiscord admin command
    usage: /<command> [reload|status|link|embed|ticket]
    permission: zdiscord.admin
    aliases: [zd]
  discord:
    description: Get the Discord server invite link
    usage: /<command>
    permission: zdiscord.discord
  sc:
    description: Staff chat bridge
    usage: /<command> [message]
    permission: zdiscord.staffchat
    aliases: [staffchat]

permissions:
  zdiscord.admin:
    description: Access to all ZDiscord admin commands
    default: op
  zdiscord.discord:
    description: Access to the /discord command
    default: true
  zdiscord.link:
    description: Allows players to link their accounts
    default: true
  zdiscord.chat:
    description: Messages are forwarded to Discord
    default: true
  zdiscord.ticket:
    description: Allows creating support tickets
    default: true
  zdiscord.embed:
    description: Allows building custom embeds
    default: op
  zdiscord.bypass.antiraid:
    description: Bypass anti-raid checks
    default: op
  zdiscord.bypass.link:
    description: Bypass link-to-join enforcement
    default: op
  zdiscord.staffchat:
    description: Access to staff chat
    default: op
