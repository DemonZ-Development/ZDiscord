config-version: 5

storage:
  # yaml = flatfile. mysql = requires a MySQL server running.
  type: "yaml"
  mysql:
    host: "localhost"
    port: 3306
    database: "zdiscord"
    username: "root"
    password: ""
    use-ssl: true

bot:
  # Create an app at https://discord.com/developers/applications,
  # give it Gateway Intents (Server Members, Message Content), then
  # copy the token here.
  token: "YOUR_BOT_TOKEN_HERE"
  activity:
    # PLAYING / WATCHING / LISTENING / COMPETING
    type: "WATCHING"
    text: "%online% players online"
  # Right-click your server in Discord > Copy ID (Developer Mode).
  guild-id: "YOUR_GUILD_ID_HERE"

# Right-click a channel in Discord > Copy ID, paste into the
# channel fields below. Leave blank ("") to disable that channel.
channels:
  chat: "YOUR_CHAT_CHANNEL_ID"
  console: ""
  events: ""
  status: ""
  performance: ""
  achievements: ""
  ticket-category: ""
  # /confess posts anonymously here. Disabled if left blank.
  confessions: ""

chat:
  use-webhooks: true
  # When true, linked players show as their Discord avatar/name
  # in the bridge. Unlinked players always use Minecraft skins.
  prefer-linked-avatar: true
  prefer-linked-name: true
  webhook-name: "%displayname%"
  # %uuid% = with dashes, %uuid_nodashes% = without, %name% = player name
  avatar-url: "https://mc-heads.net/avatar/%uuid%/128"
  # Format for messages that appear in Minecraft. Use & color codes.
  minecraft-format: "&9[Discord] &b%name% &8> &f%message%"
  show-attachments: true
  attachment-text: "&e[Attachment] &7(Click to open)"

events:
  # Channel set in channels.events above. Controls join/quit/death/advancement
  # embeds. Each sub-event can be individually disabled.
  footer-icon: ""
  join:
    enabled: true
    message: "**%player%** joined the server"
    color: "#2ECC71"
    footer-icon: ""
    # Shown to the player the first time they ever join.
    first-join-message: "&aWelcome to the server, &e%player%&a! Type &e/help&a to get started."
    show-first-join-indicator: true
  quit:
    enabled: true
    message: "**%player%** left the server"
    color: "#E74C3C"
    footer-icon: ""
  death:
    enabled: true
    message: "%death_message%"
    color: "#95A5A6"
  advancement:
    enabled: true
    color: "#F1C40F"
    # 0.25 = badge appears if fewer than 25% of players unlocked it.
    rarity-threshold: 0.25
    show-rarity: true

# Auto-updating embed. Use /setup or config channels.status.
status:
  enabled: true
  update-interval: 30
  embed:
    title: "Server Status"
    color: "#5865F2"
    show-players: true
    show-tps: true
    show-memory: true
    server-ip: "play.yourserver.com"

# Tracks kills/deaths/playtime. Stats are stored per-player and
# can be viewed with /leaderboard on Discord.
leaderboard:
  enabled: true
  # Number of entries shown per leaderboard page.
  per-page: 10
  panel-channel: ""
  panel-update-interval: 120
  panel-stats:
    - "kills"
    - "deaths"
    - "playtime"

# Creates private Discord channels for support tickets.
tickets:
  enabled: true
  # Staff roles that can see all tickets. Paste role IDs here.
  support-roles:
    - "YOUR_SUPPORT_ROLE_ID"
  max-per-user: 3
  # Tickets auto-close after this many hours of inactivity. 0 = never.
  auto-close-hours: 48
  panel-channel: ""
  panel:
    title: "Support Center"
    description: |
      Need help? Pick a category below to open a private ticket.
      Our support team will respond as soon as possible.
    color: "#5865F2"
    thumbnail: ""
    image: ""
    footer: "ZDiscord Ticket System"
  # Add or remove categories freely. Each needs a unique id.
  categories:
    - id: "general"
      label: "General Support"
      description: "Questions, account help, or anything else."
      emoji: "💬"
      color: "#5865F2"
    - id: "bug"
      label: "Bug Report"
      description: "Something on the server is broken or behaving oddly."
      emoji: "🐛"
      color: "#E67E22"
    - id: "player"
      label: "Player Report"
      description: "Report a player breaking the rules."
      emoji: "🚨"
      color: "#E74C3C"
    - id: "purchase"
      label: "Purchase Help"
      description: "Need help with a store order or rank?"
      emoji: "🛒"
      color: "#2ECC71"

# Players can link their Discord and Minecraft accounts via
# /zdiscord link in-game then /link on Discord.
linking:
  enabled: true
  # If true, players must link before they can join the server.
  required: false
  # Role ID to auto-assign on Discord when a player links.
  linked-role: ""
  # Console commands to run when a player links. Use %player%.
  rewards: []

anti-raid:
  enabled: true
  # Kicks new joins if >max-joins arrive within time-window (seconds).
  max-joins: 10
  time-window: 30
  lockdown:
    kick-new-joins: true
    kick-message: "&cServer is in lockdown mode. Please try again later."
    notify-staff: true
    # Seconds until lockdown auto-lifts. 0 = manual only.
    auto-lift: 300

performance:
  enabled: true
  update-interval: 60
  # Posts to channels.performance when thresholds are crossed.
  tps-warning: 18.0
  tps-critical: 15.0
  # Percentage of max memory.
  memory-warning: 80

reaction-roles:
  enabled: true
  # Add mappings to the `mappings` list below.
  # Each mapping: message-id, emoji, role-id, and (optional) minecraft permission.
  mappings: []

misc:
  invite-link: "https://discord.gg/yourserver"
  # Prefix for console commands sent from the console channel.
  console-prefix: "!"
  console-role: ""
  # Commands that may be run from the Discord console channel. Empty list = safe
  # defaults (read-only + moderate gameplay commands). Anything not on this list
  # is rejected. Note: op/deop/stop/restart/reload/perms are never allowed here.
  console-allowed-commands: []
  debug: false
  update-checker: true
  update-silent: false
  update-channel: ""

command-logger:
  enabled: true
  channel: ""
  # Logged in yellow. These are matched as prefixes.
  watched-commands:
    - "ban"
    - "kick"
    - "mute"
    - "whitelist"
    - "gamemode"
  # Logged in red.
  critical-commands:
    - "op"
    - "deop"
    - "stop"
    - "restart"

# Staff messages are sent from Minecraft with /sc and replied
# to from the Discord staff-chat channel.
staff-chat:
  enabled: true
  channel: "YOUR_STAFF_CHAT_CHANNEL_ID"

voice-status:
  enabled: true
  # Tracks how many people are in a voice channel and posts
  # live updates to the channels.status embed.
  channel: ""

profile:
  embed:
    color: "#9B59B6"

# /profile has a Follow button. When the player joins the
# server, followers get a DM notification.
follow:
  enabled: true
  join-notification-cooldown: 300

confessions:
  color: "#9B59B6"
  # Seconds between confessions per user.
  cooldown: 300

api:
  # Enables the Bukkit API other plugins can hook into.
  enabled: true

logging:
  level: INFO
  compact: true
  categories:
    bot: INFO
    storage: WARN
    modules: INFO
    events: INFO
    api: INFO
    setup: INFO
    commands: INFO
    webhook: WARN
  suppress-jda: true
  suppress-hikari: true
